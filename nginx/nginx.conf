worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # File upload size limit (match backend's 50MB max)
    client_max_body_size 50m;

    # Rate limiting zone
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # Upstream backend
    upstream backend {
        server backend:8000;
    }

    # ---- HTTP -> HTTPS redirect ----
    server {
        listen 80;
        server_name your-domain.com;  # TODO: Replace with your domain

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---- HTTPS server ----
    server {
        listen 443 ssl http2;
        server_name your-domain.com;  # TODO: Replace with your domain

        # SSL certificates (Let's Encrypt)
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ---- Uploaded files (served directly by Nginx, not via backend) ----
        location /uploads/ {
            alias /app/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ---- WebSocket ----
        location /api/v1/ws {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;  # Keep WebSocket alive for 24h
            proxy_send_timeout 86400s;
        }

        # ---- API ----
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- Health check (no rate limit) ----
        location /health {
            proxy_pass http://backend;
        }

        # ---- Swagger docs (optional, disable in production) ----
        location /docs {
            proxy_pass http://backend;
        }
        location /openapi.json {
            proxy_pass http://backend;
        }
    }
}
